name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}-backend
  IMAGE_FRONTEND: ${{ github.repository }}-frontend

jobs:
  # ───────────────────────────────
  # 1. 后端：依赖 + 冒烟
  # ───────────────────────────────
  backend-test:
    name: Backend · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed database
        working-directory: backend
        run: python seed.py

      - name: Start API in background
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          echo $! > api.pid
          for i in {1..20}; do
            sleep 1
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null; then
              echo "API ready"; exit 0
            fi
          done
          echo "API failed to start"; cat api.log; exit 1

      - name: Smoke tests
        run: |
          set -e
          echo "== health =="
          curl -fsS http://127.0.0.1:8000/api/health | tee /dev/stderr | grep -q '"ok":true'

          echo "== list prompts =="
          curl -fsS http://127.0.0.1:8000/api/prompts | python -c "import json,sys;d=json.load(sys.stdin);assert len(d)>=3,'seed not loaded';print('prompts:',len(d))"

          echo "== render engine =="
          curl -fsS -X POST http://127.0.0.1:8000/api/render \
            -H "Content-Type: application/json" \
            -d '{"template":"hi {{name}}","variables":{"name":"宁"}}' | grep -q '"rendered":"hi 宁"'

          echo "== commit new version =="
          curl -fsS -X POST http://127.0.0.1:8000/api/prompts/1/commit \
            -H "Content-Type: application/json" \
            -d '{"template":"ci v2 {{x}}","variables_schema":[{"name":"x","type":"string"}],"commit_message":"ci","branch":"main"}' | grep -q '"version_no":2'

          echo "== ai fallback =="
          curl -fsS -X POST http://127.0.0.1:8000/api/ai/generate \
            -H "Content-Type: application/json" \
            -d '{"goal":"write a CI demo"}' | grep -q '"template"'

      - name: Stop API
        if: always()
        working-directory: backend
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" 2>/dev/null || true; fi

      - name: Upload API log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-log
          path: backend/api.log

  # ───────────────────────────────
  # 2. 前端：类型检查 + 生产构建
  # ───────────────────────────────
  frontend-build:
    name: Frontend · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Type check + build
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ───────────────────────────────
  # 3. 构建并推送 Docker 镜像
  # ───────────────────────────────
  docker:
    name: Docker · build & push
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    # Pull Request 只 build 不 push（避免外部 PR 拿到 GHCR 写权限）
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### 📦 Images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Backend tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta_backend.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "**Frontend tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta_frontend.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────
  # 4. Release（打 tag 时创建）
  # ───────────────────────────────
  release:
    name: GitHub Release
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp docker-compose.release.yml release/docker-compose.yml
          cp .env.example release/.env.example
          cp README.md release/README.md
          (cd release && tar czf ../promptos-${{ github.ref_name }}-deploy.tgz .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            promptos-${{ github.ref_name }}-deploy.tgz
          body: |
            ## 🚀 PromptOS ${{ github.ref_name }}

            ### 一键部署

            ```bash
            mkdir promptos && cd promptos
            curl -sL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/promptos-${{ github.ref_name }}-deploy.tgz | tar xz
            cp .env.example .env   # 按需编辑
            docker compose up -d
            ```

            打开 <http://localhost:8080>

            ### 镜像

            - `ghcr.io/${{ github.repository }}-backend:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}-frontend:${{ github.ref_name }}`
