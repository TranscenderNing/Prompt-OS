# PromptOS Release 版 · 拉取预构建镜像
# 1. curl -sL <release>/promptos-<tag>-deploy.tgz | tar xz
# 2. cp .env.example .env   # 按需编辑
# 3. docker compose up -d

services:
  backend:
    # 由 Release/CI 替换 IMAGE_TAG；默认 latest
    image: ghcr.io/OWNER/REPO-backend:${IMAGE_TAG:-latest}
    container_name: promptos-backend
    restart: unless-stopped
    environment:
      PROMPTOS_LLM_BASE_URL: ${PROMPTOS_LLM_BASE_URL:-}
      PROMPTOS_LLM_API_KEY: ${PROMPTOS_LLM_API_KEY:-}
      PROMPTOS_LLM_MODEL: ${PROMPTOS_LLM_MODEL:-gpt-4o-mini}
      PROMPTOS_DB: /data/promptos.db
    volumes:
      - promptos-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - promptos

  frontend:
    image: ghcr.io/OWNER/REPO-frontend:${IMAGE_TAG:-latest}
    container_name: promptos-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PROMPTOS_PORT:-8080}:80"
    networks:
      - promptos

volumes:
  promptos-data:
    name: promptos-data

networks:
  promptos:
    name: promptos-net
