# PromptOS 开发模式（代码热更新）
# 启动：  docker compose -f docker-compose.dev.yml up --build
# 后端 :8000 可直接调，前端 :5173 热更新，/api 自动代理到 backend:8000

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: promptos-backend-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PROMPTOS_DB: /data/promptos.db
      PROMPTOS_LLM_BASE_URL: ${PROMPTOS_LLM_BASE_URL:-}
      PROMPTOS_LLM_API_KEY: ${PROMPTOS_LLM_API_KEY:-}
      PROMPTOS_LLM_MODEL: ${PROMPTOS_LLM_MODEL:-gpt-4o-mini}
    volumes:
      - ./backend:/app
      - promptos-data:/data
    ports:
      - "8000:8000"
    networks:
      - promptos

  frontend:
    image: node:20-alpine
    container_name: promptos-frontend-dev
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # 开发模式下 Vite 代理指向 host "backend"
      VITE_API_BASE: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - promptos

volumes:
  promptos-data:
    name: promptos-data

networks:
  promptos:
    name: promptos-net
